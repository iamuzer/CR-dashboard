<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CryptoRisk — Backtest Martie 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070b0f;--panel:#0c1118;--border:#172030;--safe:#00e87a;--warn:#ffb300;--danger:#ff3355;--neutral:#4a6080;--text:#b8cde0;--white:#e8f0f8}

<body>
<h1>CryptoRisk v5 — Backtest Martie 2026</h1>
<div class="sub">Simulare logică dashboard pe date reale Binance · 1 Martie – 28 Martie 2026</div>

<button class="btn" id="runBtn" onclick="run()">▶ Rulează Backtestul</button>
<div id="log">Apasă butonul pentru a încărca datele și rula backtestul...</div>
<div id="results"></div>

<script>
// ═══════════════════════════════════════════════════════
// MATH — same logic as dashboard
// ═══════════════════════════════════════════════════════
function calcRSI(closes, period=14) {
  if(closes.length < period+1) return null;
  let gA=0, lA=0;
  for(let i=1;i<=period;i++){const d=closes[i]-closes[i-1]; if(d>0) gA+=d; else lA+=Math.abs(d);}
  gA/=period; lA/=period;
  const arr=[];
  arr.push(lA===0?100:gA===0?0:100-(100/(1+gA/lA)));
  for(let i=period+1;i<closes.length;i++){
    const d=closes[i]-closes[i-1];
    gA=(gA*(period-1)+(d>0?d:0))/period;
    lA=(lA*(period-1)+(d<0?Math.abs(d):0))/period;
    arr.push(lA===0?100:gA===0?0:100-(100/(1+gA/lA)));
  }
  return arr;
}

function calcEMA(closes, period) {
  if(closes.length < period) return null;
  const k=2/(period+1);
  let ema=closes.slice(0,period).reduce((a,b)=>a+b,0)/period;
  for(let i=period;i<closes.length;i++) ema=closes[i]*k+ema*(1-k);
  return ema;
}

function calcMACD(closes, fast=12, slow=26, signal=9) {
  if(closes.length < slow+signal+5) return null;
  const ema=(c,p)=>{const k=2/(p+1);let e=c.slice(0,p).reduce((a,b)=>a+b,0)/p;for(let i=p;i<c.length;i++)e=c[i]*k+e*(1-k);return e;};
  const macdArr=[];
  for(let i=slow-1;i<closes.length;i++) macdArr.push(ema(closes.slice(0,i+1),fast)-ema(closes.slice(0,i+1),slow));
  const k=2/(signal+1);let sig=macdArr.slice(0,signal).reduce((a,b)=>a+b,0)/signal;
  const sigArr=[sig];
  for(let i=signal;i<macdArr.length;i++){sig=macdArr[i]*k+sig*(1-k);sigArr.push(sig);}
  const n=sigArr.length, macdLine=macdArr[macdArr.length-1], signalLine=sigArr[n-1];
  const hist=macdLine-signalLine, prevHist=macdArr[macdArr.length-2]-sigArr[n-2];
  return{macdLine,signalLine,hist,bullish:macdLine>signalLine,crossup:hist>0&&prevHist<=0,crossdown:hist<0&&prevHist>=0};
}

function calcIchimoku(candles) {
  if(candles.length<27) return null;
  const n=candles.length;
  const hN=(e,k)=>Math.max(...candles.slice(Math.max(0,e-k+1),e+1).map(x=>x.high));
  const lN=(e,k)=>Math.min(...candles.slice(Math.max(0,e-k+1),e+1).map(x=>x.low));
  const tenkan=(hN(n-1,9)+lN(n-1,9))/2, kijun=(hN(n-1,26)+lN(n-1,26))/2;
  const i26=n-27;
  let sA,sB;
  if(i26>=26){const t26=(hN(i26,9)+lN(i26,9))/2,k26=(hN(i26,26)+lN(i26,26))/2;sA=(t26+k26)/2;sB=(hN(i26,Math.min(52,i26+1))+lN(i26,Math.min(52,i26+1)))/2;}
  else{sA=(tenkan+kijun)/2;sB=(hN(n-1,Math.min(52,n))+lN(n-1,Math.min(52,n)))/2;}
  const price=candles[n-1].close;
  const cTop=Math.max(sA,sB),cBot=Math.min(sA,sB);
  const above=price>cTop, below=price<cBot, tkBull=tenkan>kijun;
  const bullCount=[above,tkBull,candles[n-1].close>candles[Math.max(0,n-27)].close,(sA>sB)].filter(Boolean).length;
  return{above,below,tkBull,bullCount,cTop,cBot,kijun};
}

function swingHigh(closes, lookback=5) {
  for(let i=closes.length-lookback-1;i>=lookback;i--){
    const left=closes.slice(i-lookback,i), right=closes.slice(i+1,i+lookback+1);
    if(right.length<lookback) continue;
    if(closes[i]>Math.max(...left)&&closes[i]>Math.max(...right)) return{price:closes[i],barsAgo:closes.length-1-i};
  }
  return null;
}
function swingLow(closes, lookback=5) {
  for(let i=closes.length-lookback-1;i>=lookback;i--){
    const left=closes.slice(i-lookback,i), right=closes.slice(i+1,i+lookback+1);
    if(right.length<lookback) continue;
    if(closes[i]<Math.min(...left)&&closes[i]<Math.min(...right)) return{price:closes[i],barsAgo:closes.length-1-i};
  }
  return null;
}

// ═══════════════════════════════════════════════════════
// DASHBOARD LOGIC — applied per day
// ═══════════════════════════════════════════════════════
function analyzeDay(dayIdx, btcDaily, ethDaily, btcWeekly, btc4H, eth4H, btcFunding, ethFunding, fg, dom) {
  // Use data up to this day (no lookahead)
  const btcD = btcDaily.slice(0, dayIdx+1);
  const ethD = ethDaily.slice(0, dayIdx+1);
  const price = btcD[btcD.length-1].close;
  const ethPrice = ethD[ethD.length-1].close;
  const prevPrice = btcD.length>1 ? btcD[btcD.length-2].close : price;
  const dayChg = ((price-prevPrice)/prevPrice*100);

  const btcCloses = btcD.map(c=>c.close);
  const ethCloses = ethD.map(c=>c.close);

  // RSI
  const rsiDArr = calcRSI(btcCloses, 14);
  const rsiD = rsiDArr ? rsiDArr[rsiDArr.length-1] : 50;
  const rsiDPrev = rsiDArr && rsiDArr.length>1 ? rsiDArr[rsiDArr.length-2] : rsiD;
  const rsiWArr = calcRSI(btcWeekly.map(c=>c.close), 14);
  const rsiW = rsiWArr ? rsiWArr[rsiWArr.length-1] : 50;
  const ethRsiArr = calcRSI(ethCloses, 14);
  const ethRsiD = ethRsiArr ? ethRsiArr[ethRsiArr.length-1] : 50;

  // EMA200
  const ema200 = calcEMA(btcCloses, Math.min(200, btcCloses.length));
  const ema200Dist = ema200 ? (price-ema200)/ema200*100 : 0;

  // EMA 4H
  const closes4H = btc4H.map(c=>c.close);
  const e9  = calcEMA(closes4H, 9)  || price;
  const e21 = calcEMA(closes4H, 21) || price;
  const e50 = calcEMA(closes4H, 50) || price;
  const stackBull = e9>e21&&e21>e50&&price>e9;
  const stackBear = e9<e21&&e21<e50&&price<e9;

  // MACD 4H
  const macd = calcMACD(closes4H, 12, 26, 9);
  const macdBull = macd?.bullish ?? false;
  const macdCross = macd?.crossup || macd?.crossdown;

  // Ichimoku 1W
  const ichi = calcIchimoku(btcWeekly);

  // ETH Relative
  const ethbtc = ethPrice/price;
  const ethRsiDiff = ethRsiD - rsiD;
  const ethbtcChg = ethD.length>1 ? ((ethD[ethD.length-1].close - ethD[ethD.length-2].close)/ethD[ethD.length-2].close*100) : 0;
  let ethScore = 50;
  if(ethbtc<0.025) ethScore-=20; else if(ethbtc<0.04) ethScore-=12; else if(ethbtc>0.055) ethScore+=12;
  if(dom>58) ethScore-=12; else if(dom<50) ethScore+=10;
  if(ethRsiDiff<-8) ethScore-=10; else if(ethRsiDiff>8) ethScore+=10;
  if(ethbtcChg<dayChg-3) ethScore-=10; else if(ethbtcChg>dayChg+3) ethScore+=10;
  ethScore=Math.max(0,Math.min(100,Math.round(ethScore)));
  const ethState = ethScore>=65?'STRENGTH':ethScore<=35?'WEAKNESS':'NEUTRU';

  // ── NIVEAU 1: Context (Bias structural) ──
  const contextBear = (ichi?.bullCount||2)<=1 || ema200Dist<0;
  const contextBull = (ichi?.bullCount||2)>=3 && ema200Dist>0;

  // ── NIVEAU 2: Confirmation ──
  const confBear = rsiD<45 || ethState==='WEAKNESS';
  const confBull = rsiD>55 && ethState!=='WEAKNESS';
  const confState = contextBear ? (confBear?'Aligned':confBull?'Contradicting':'Mixed') : 'N/A';

  // ── NIVEAU 3: Trigger ──
  const triggerBearSigs=[];
  if(stackBear) triggerBearSigs.push('EMA bear stack');
  if(!macdBull) triggerBearSigs.push('MACD bearish'+(macd?.crossdown?' ⚡':''));
  if(rsiD<45)   triggerBearSigs.push('RSI<45('+rsiD.toFixed(0)+')');
  if(btcFunding>0.03) triggerBearSigs.push('Funding high');
  const triggerBull=stackBull&&macdBull;
  const triggerBear=triggerBearSigs.length>=2;

  // ── NIVEAU 4: Fuel ──
  const fuelBear = ethState==='WEAKNESS' || fg<30 || btcFunding>0.05;
  const fuelBull = ethState==='STRENGTH' || fg<25;

  // ── ALERT STATE ──
  let alertState='', alertColor='neutral';
  // No trade zone
  const emaFlat = Math.abs(e9-e21)/e21<0.005;
  const rsi4hRaw = calcRSI(closes4H,14);
  const rsi4h = rsi4hRaw ? rsi4hRaw[rsi4hRaw.length-1] : 50;
  const noTrade = emaFlat && rsi4h>40 && rsi4h<60 && ethState==='NEUTRU';

  if(noTrade) { alertState='◈ CONSOLIDARE'; alertColor='neutral'; }
  else if(contextBear && triggerBull && !triggerBear) { alertState='↗ COUNTER-TREND'; alertColor='purple'; }
  else if(contextBear) {
    if(confState==='Contradicting') { alertState='◈ BIAS BEAR (contradicție)'; alertColor='warn'; }
    else if(triggerBear) {
      if(fuelBear && confState==='Aligned') { alertState='🔴 SEMNAL BEAR ACTIV'; alertColor='danger'; }
      else { alertState='⚠ SETUP BEAR FORMARE'; alertColor='warn'; }
    } else { alertState='◈ BIAS BEARISH'; alertColor='warn'; }
  }
  else if(contextBull) {
    if(triggerBull && fuelBull) { alertState='🟢 SEMNAL BULL ACTIV'; alertColor='safe'; }
    else if(triggerBull) { alertState='↑ SETUP BULL FORMARE'; alertColor='safe'; }
    else { alertState='◈ BIAS BULLISH'; alertColor='safe'; }
  }
  else { alertState='◈ CONTEXT NECLAR'; alertColor='neutral'; }

  // ── Extension Risk Flags ──
  const overextended = ema200Dist>20;
  const modDrawdown = false; // need ATH data — simplified
  const confidencePenalty = Math.min(0.20, (overextended?0.20:0));

  return {
    date: btcD[btcD.length-1].ts || dayIdx,
    price, ethPrice, dayChg,
    rsiD: rsiD.toFixed(1), rsiW: rsiW.toFixed(1), rsi4h: rsi4h.toFixed(1),
    ema200Dist: ema200Dist.toFixed(1),
    stackBull, stackBear, macdBull, macdCross,
    ichiAbove: ichi?.above, ichiBelow: ichi?.below,
    ethState, ethScore,
    contextBear, contextBull,
    confState, triggerBear, triggerBull, fuelBear, fuelBull,
    alertState, alertColor,
    confidencePenalty: (confidencePenalty*100).toFixed(0),
    noTrade,
  };
}

// ═══════════════════════════════════════════════════════
// EVALUATION — compare signal vs next day move
// ═══════════════════════════════════════════════════════
function evaluateSignal(alert, nextDayChg) {
  if(nextDayChg === null) return {result:'⏳', correct: null};
  const isBearAlert = alert.includes('BEAR') || alert.includes('BIAS BEAR');
  const isBullAlert = alert.includes('BULL') || alert.includes('BIAS BULL');
  const isBear = nextDayChg <= -2;
  const isBull = nextDayChg >= 2;
  const isNeutral = !isBear && !isBull;

  if(alert.includes('CONSOLIDARE') || alert.includes('NECLAR')) {
    return {result: isNeutral?'✅ corect':'〰 parțial', correct: isNeutral};
  }
  if(isBearAlert) {
    if(isBear) return {result:'✅ corect', correct:true};
    if(isNeutral) return {result:'〰 parțial', correct:null};
    return {result:'❌ greșit', correct:false};
  }
  if(isBullAlert) {
    if(isBull) return {result:'✅ corect', correct:true};
    if(isNeutral) return {result:'〰 parțial', correct:null};
    return {result:'❌ greșit', correct:false};
  }
  if(alert.includes('COUNTER-TREND')) {
    // Counter-trend = we expect bounce in bear = small up, not continuation
    return {result: isBull?'✅ corect': isBear?'❌ greșit':'〰 parțial', correct: isBull};
  }
  return {result:'—', correct:null};
}

// ═══════════════════════════════════════════════════════
// FETCH + RUN
// ═══════════════════════════════════════════════════════
async function fetchKlines(symbol, interval, limit) {
  const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
  const r = await fetch(url);
  if(!r.ok) throw new Error(`${symbol} ${interval}: HTTP ${r.status}`);
  const data = await r.json();
  return data.map(k => ({
    ts: new Date(k[0]).toISOString().slice(0,10),
    open:+k[1], high:+k[2], low:+k[3], close:+k[4], vol:+k[5]
  }));
}

async function fetchFunding(symbol) {
  const url = `https://fapi.binance.com/fapi/v1/fundingRate?symbol=${symbol}&limit=200`;
  const r = await fetch(url);
  if(!r.ok) return {};
  const data = await r.json();
  const map = {};
  data.forEach(d => {
    const date = new Date(d.fundingTime).toISOString().slice(0,10);
    map[date] = (map[date] || 0) + parseFloat(d.fundingRate)*100;
  });
  return map;
}

function log(msg) { document.getElementById('log').textContent = msg; }

async function run() {
  const btn = document.getElementById('runBtn');
  btn.disabled = true;
  btn.textContent = '⏳ Se încarcă datele...';

  try {
    log('Fetching BTC 1D klines...');
    const btcDaily = await fetchKlines('BTCUSDT','1d',365);

    log('Fetching ETH 1D klines...');
    const ethDaily = await fetchKlines('ETHUSDT','1d',365);

    log('Fetching BTC 1W klines...');
    const btcWeekly = await fetchKlines('BTCUSDT','1w',100);

    log('Fetching BTC 4H klines...');
    const btc4H = await fetchKlines('BTCUSDT','4h',500);

    log('Fetching ETH 4H klines...');
    const eth4H = await fetchKlines('ETHUSDT','4h',500);

    log('Fetching funding rates...');
    const btcFundingMap = await fetchFunding('BTCUSDT');
    const ethFundingMap = await fetchFunding('ETHUSDT');

    log('Fetching Fear & Greed...');
    const fngResp = await fetch('https://api.alternative.me/fng/?limit=60');
    const fngData = await fngResp.json();
    const fngMap = {};
    fngData.data.forEach(d => {
      const date = new Date(d.timestamp*1000).toISOString().slice(0,10);
      fngMap[date] = parseInt(d.value);
    });

    log('Fetching BTC dominance...');
    const domResp = await fetch('https://api.coingecko.com/api/v3/global');
    const domData = await domResp.json();
    const dom = domData.data.market_cap_percentage.btc;

    // Filter March 2026
    const marchStart = '2026-03-01';
    const marchEnd   = '2026-03-28';
    const marchDays  = btcDaily.filter(d => d.ts >= marchStart && d.ts <= marchEnd);

    log(`Analizând ${marchDays.length} zile din Martie 2026...`);

    const results = [];
    for(const day of marchDays) {
      const dayIdx = btcDaily.findIndex(d => d.ts === day.ts);
      if(dayIdx < 50) continue; // not enough history

      // Get 4H candles up to this day
      const dayEnd = new Date(day.ts); dayEnd.setDate(dayEnd.getDate()+1);
      const btc4HSlice = btc4H.filter(c => new Date(c.ts) <= dayEnd).slice(-120);
      const eth4HSlice = eth4H.filter(c => new Date(c.ts) <= dayEnd).slice(-120);

      const btcFund = btcFundingMap[day.ts] || 0.01;
      const ethFund = ethFundingMap[day.ts] || 0.01;
      const fg = fngMap[day.ts] || 50;

      const analysis = analyzeDay(
        dayIdx, btcDaily, ethDaily, btcWeekly,
        btc4HSlice, eth4HSlice,
        btcFund, ethFund, fg, dom
      );
      analysis.date = day.ts;

      // Next day move for evaluation
      const nextDay = btcDaily[dayIdx+1];
      const nextChg = nextDay ? ((nextDay.close - day.close)/day.close*100) : null;
      analysis.nextDayChg = nextChg;
      analysis.eval = evaluateSignal(analysis.alertState, nextChg);

      results.push(analysis);
    }

    renderResults(results);
    log(`✅ Backtest complet — ${results.length} zile analizate`);

  } catch(e) {
    log('❌ Eroare: ' + e.message);
    console.error(e);
  }

  btn.disabled = false;
  btn.textContent = '▶ Rulează din nou';
}

function fmt(v) { return '$'+Math.round(v).toLocaleString('en-US'); }
function fmtP(v) { return (v>=0?'+':'')+parseFloat(v).toFixed(2)+'%'; }

function pillColor(ac) {
  return ac==='danger'?'pill-danger':ac==='safe'?'pill-safe':ac==='warn'?'pill-warn':ac==='purple'?'pill-purple':'pill-neutral';
}

function renderResults(rows) {
  const correct = rows.filter(r=>r.eval.correct===true).length;
  const wrong   = rows.filter(r=>r.eval.correct===false).length;
  const partial = rows.filter(r=>r.eval.correct===null && r.eval.result!=='⏳').length;
  const total   = rows.filter(r=>r.eval.result!=='⏳').length;
  const accuracy = total>0 ? Math.round(correct/total*100) : 0;

  // Count alert types
  const bearSignals  = rows.filter(r=>r.alertState.includes('SEMNAL BEAR')).length;
  const bullSignals  = rows.filter(r=>r.alertState.includes('SEMNAL BULL')).length;
  const setupBear    = rows.filter(r=>r.alertState.includes('SETUP BEAR')).length;
  const noTrade      = rows.filter(r=>r.noTrade).length;
  const counterTrend = rows.filter(r=>r.alertState.includes('COUNTER')).length;

  const el = document.getElementById('results');
  el.innerHTML = `
    <div class="section-title">Rezumat Backtest — Martie 2026 (${rows.length} zile)</div>
    <div class="summary">
      <div class="stat">
        <div class="stat-val safe">${accuracy}%</div>
        <div class="stat-lbl">Acuratețe semnale</div>
      </div>
      <div class="stat">
        <div class="stat-val safe">${correct}</div>
        <div class="stat-lbl">✅ Corecte</div>
      </div>
      <div class="stat">
        <div class="stat-val warn">${partial}</div>
        <div class="stat-lbl">〰 Parțiale</div>
      </div>
      <div class="stat">
        <div class="stat-val danger">${wrong}</div>
        <div class="stat-lbl">❌ Greșite</div>
      </div>
      <div class="stat">
        <div class="stat-val neutral">${total}</div>
        <div class="stat-lbl">Total evaluate</div>
      </div>
    </div>

    <div class="summary">
      <div class="stat"><div class="stat-val danger">${bearSignals}</div><div class="stat-lbl">🔴 Semnale Bear</div></div>
      <div class="stat"><div class="stat-val safe">${bullSignals}</div><div class="stat-lbl">🟢 Semnale Bull</div></div>
      <div class="stat"><div class="stat-val warn">${setupBear}</div><div class="stat-lbl">⚠ Setup Bear</div></div>
      <div class="stat"><div class="stat-val" style="color:#a78bfa">${counterTrend}</div><div class="stat-lbl">↗ Counter-trend</div></div>
      <div class="stat"><div class="stat-val neutral">${noTrade}</div><div class="stat-lbl">◈ No Trade Zone</div></div>
    </div>

    <div class="legend">
      <div class="leg-item"><div class="leg-dot" style="background:var(--danger)"></div>SEMNAL BEAR ACTIV</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--warn)"></div>SETUP / BIAS</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--safe)"></div>SEMNAL BULL</div>
      <div class="leg-item"><div class="leg-dot" style="background:#a78bfa"></div>COUNTER-TREND</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--neutral)"></div>CONSOLIDARE / NECLAR</div>
    </div>

    <div class="section-title">Detaliu pe Zile</div>
    <table>
      <thead>
        <tr>
          <th>Data</th>
          <th>BTC</th>
          <th>Δ Zi</th>
          <th>RSI 1D</th>
          <th>RSI 1W</th>
          <th>EMA200</th>
          <th>Ichimoku</th>
          <th>ETH Rel.</th>
          <th>Alert State</th>
          <th>Δ Ziua urm.</th>
          <th>Evaluare</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => {
          const chgClass = r.dayChg>0?'safe':r.dayChg<0?'danger':'neutral';
          const nextClass = r.nextDayChg===null?'neutral':r.nextDayChg>2?'safe':r.nextDayChg<-2?'danger':'warn';
          const ichiState = r.ichiAbove?'↑ deasupra':r.ichiBelow?'↓ sub':'◈ în nor';
          const ichiClass = r.ichiAbove?'safe':r.ichiBelow?'danger':'warn';
          const evalClass = r.eval.result.includes('✅')?'safe':r.eval.result.includes('❌')?'danger':r.eval.result.includes('〰')?'warn':'neutral';
          const penStr = r.confidencePenalty>0?` (-${r.confidencePenalty}%)` : '';
          return `<tr>
            <td style="white-space:nowrap">${r.date}</td>
            <td style="white-space:nowrap">${fmt(r.price)}</td>
            <td class="${chgClass}">${fmtP(r.dayChg)}</td>
            <td>${r.rsiD}</td>
            <td>${r.rsiW}</td>
            <td class="${parseFloat(r.ema200Dist)>20?'warn':parseFloat(r.ema200Dist)<0?'danger':'safe'}">${r.ema200Dist}%${penStr}</td>
            <td class="${ichiClass}">${ichiState}</td>
            <td class="${r.ethState==='WEAKNESS'?'danger':r.ethState==='STRENGTH'?'safe':'neutral'}">${r.ethState}</td>
            <td><span class="pill ${pillColor(r.alertColor)}">${r.alertState}</span></td>
            <td class="${nextClass}">${r.nextDayChg!==null?fmtP(r.nextDayChg):'—'}</td>
            <td class="${evalClass}">${r.eval.result}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    <div class="section-title" style="margin-top:24px">Note metodologice</div>
    <div style="font-size:.64rem;color:var(--neutral);line-height:1.8">
      • Evaluarea se face pe mișcarea zilei URMĂTOARE față de semnalul zilei curente (T+1).<br>
      • Corect = direcția prezisă și mișcare >2% în direcția respectivă.<br>
      • Parțial = semnal bearish/bullish dar mișcarea < 2% (consolidare).<br>
      • Greșit = direcție opusă cu mișcare >2%.<br>
      • No Trade Zone și Context Neclar = corect dacă ziua următoare e neutră (|Δ| < 2%).<br>
      • Funding rate daily = medie a celor 3 plăți din ziua respectivă.<br>
      • EMA200 calculat pe datele disponibile până la ziua analizată (no lookahead).<br>
      • ⚠ Backtestul simplifică unele calcule față de dashboard (ex: Chikou 1M, Fibonacci, Trendline Detection).<br>
      • Rezultatele sunt euristice — nu constituie validare statistică.
    </div>
  `;
}
</script>
</body>
</html>
